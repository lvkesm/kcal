<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Étel Kalória Számláló</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: #fff; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 15px; }
        input[type="file"] { display: none; }
        .upload-btn { background: #ff4757; color: white; padding: 12px 24px; border-radius: 25px; cursor: pointer; display: inline-block; margin: 15px 0; font-weight: bold; }
        button.submit-btn { background: #2ed573; color: white; border: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; display: none; }
        #preview { max-width: 100%; max-height: 250px; border-radius: 10px; margin-top: 15px; display: none; }
        #loading { display: none; margin: 15px 0; color: #ffa502; font-weight: bold; }
        #results { margin-top: 20px; text-align: left; background: #2f3542; padding: 15px; border-radius: 10px; display: none; }
        .macro { display: flex; justify-content: space-between; border-bottom: 1px solid #4b5563; padding: 8px 0; }
        .settings { background: #222; padding: 10px; border-radius: 10px; font-size: 12px; margin-top: 20px; text-align: left; }
        .settings input { background: #333; color: white; border: 1px solid #444; padding: 5px; width: 80%; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>AI Étel Elemző</h2>
        <p>Fotózz le egy ételt a makrók megtekintéséhez!</p>
        
        <label for="imageInput" class="upload-btn">Kamera / Galéria</label>
        <input type="file" id="imageInput" accept="image/*" capture="environment">
        
        <br>
        <img id="preview" alt="Előnézet">
        
        <button id="submitBtn" class="submit-btn">Elemzés indítása</button>
        
        <div id="loading">Gemini épp számol... 🧠</div>
        
        <div id="results">
            <h3 id="foodName" style="color: #2ed573; margin-top: 0; text-align: center;"></h3>
            <div class="macro"><span>Kalória:</span> <strong id="resCal"></strong></div>
            <div class="macro"><span>Fehérje:</span> <strong id="resProt"></strong></div>
            <div class="macro"><span>Szénhidrát:</span> <strong id="resCarb"></strong></div>
            <div class="macro"><span>Zsír:</span> <strong id="resFat"></strong></div>
        </div>
    </div>

    <!-- Biztonságos API kulcs tároló a telefonodnak -->
    <div class="settings">
        <h4>⚙️ Beállítások (Csak neked látható)</h4>
        <label for="apiKey">Gemini API Kulcs:</label>
        <input type="password" id="apiKey" placeholder="AI Studio kulcs helye...">
        <button onclick="saveKey()" style="background: #57606f; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Mentés</button>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const apiKeyInput = document.getElementById('apiKey');

        // Betöltéskor ellenőrizzük, van-e már elmentett kulcs
        window.onload = function() {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }
        };

        function saveKey() {
            localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
            alert('API kulcs sikeresen elmentve a telefonodon!');
        }

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                    submitBtn.style.display = 'block';
                    results.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        submitBtn.addEventListener('click', async () => {
            const file = imageInput.files[0];
            const apiKey = localStorage.getItem('gemini_api_key');

            if (!apiKey) {
                alert('Kérlek, először mentsd el a Gemini API kulcsodat alul!');
                return;
            }
            if (!file) return;

            loading.style.display = 'block';
            submitBtn.style.display = 'none';
            results.style.display = 'none';

            // Kép átalakítása Base64 formátumba, amit a Gemini közvetlenül megért
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async function() {
                const base64Data = reader.result.split(',')[1];
                const mimeType = file.type;

                const prompt = "Elemezd a képen látható ételt. Becsüld meg a makrotápanyagait egy átlagos adag alapján. Kizárólag egy érvényes JSON objektumot adj vissza, markdown formázás (pl. ```json) nélkül! Szerkezet: {\"food_name\": \"Név\", \"calories\": 0, \"protein\": 0, \"carbs\": 0, \"fat\": 0}";

                const url = `[https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$](https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$){apiKey}`;

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: prompt },
                                    { inlineData: { mimeType: mimeType, data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const jsonResponse = await response.json();
                    let responseText = jsonResponse.candidates[0].content.parts[0].text.strip;
                    
                    // Tisztítás, ha mégis rakott volna bele jeleket az AI
                    responseText = responseText.replace(/```json/g, "").replace(/```/g, "").trim();
                    
                    const data = JSON.parse(responseText);

                    document.getElementById('foodName').innerText = data.food_name;
                    document.getElementById('resCal').innerText = data.calories + ' kcal';
                    document.getElementById('resProt').innerText = data.protein + ' g';
                    document.getElementById('resCarb').innerText = data.carbs + ' g';
                    document.getElementById('resFat').innerText = data.fat + ' g';
                    results.style.display = 'block';

                } catch (err) {
                    alert('Hiba történt az elemzés során. Ellenőrizd az API kulcsot!');
                    console.error(err);
                } finally {
                    loading.style.display = 'none';
                    submitBtn.style.display = 'block';
                }
            };
        });
    </script>
</body>
</html>
